name: Neoload Test Execution - Dev Branch
on:
  push:
    branches:
      - dev  # Automatically runs when you push code to the dev branch
  workflow_dispatch: # Still allows you to run it manually

jobs:
  run-neoload-test:
    runs-on: neoload3 # Matches your active runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: dev # Forces the checkout of the dev branch

      - name: Execute NeoLoad Scenario & Generate Report
        shell: powershell
        run: |
          $neoloadPath = 'C:\Program Files\NeoLoad 9.1\bin\NeoLoadCmd.exe'
          $projectPath = "${{ github.workspace }}\neoload3.nlp"
          $reportPath = "${{ github.workspace }}\neoload-report"
          
          # Execute with the -report flag to create the results folder
          & $neoloadPath -project $projectPath -launch "scenario1" -noGUI -report $reportPath
          


   
